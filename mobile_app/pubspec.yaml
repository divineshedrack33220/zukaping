name: lemon16_mobile
description: Zukaping - Connect. Share. Grow.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.3.0
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  web_socket_channel: ^2.4.0
  geolocator: ^10.1.0
  shimmer: ^3.0.0
  share_plus: ^7.2.1
  flutter_local_notifications: ^17.1.2
  google_sign_in: ^6.2.1
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
