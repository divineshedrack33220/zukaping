services:
  - type: web
    name: coded-backend
    env: go
    buildCommand: cd backend && go build -o coded-backend
    startCommand: cd backend && ./coded-backend
    envVars:
      - key: PORT
        value: 10000
      - key: GIN_MODE
        value: release
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
