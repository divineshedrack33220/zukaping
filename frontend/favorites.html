<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>InstaPing | Favorites</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="asset/logo.jpeg">
  <meta name="theme-color" content="#00AEEF">
  <link rel="apple-touch-icon" href="/asset/logo.jpeg">

  <style>
    /* === LIGHT MODE COLOR SCHEME === */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #FFFFFF; color: #000000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: #FFFFFF; border-bottom: 1px solid #E0E0E0; position: sticky; top: 0; z-index: 100; }
    
    /* Logo with blue circle */
    .logo-small { 
      width: 40px; 
      height: 40px; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      position: relative;
    }
    .logo-small::before {
      content: '';
      position: absolute;
      width: 48px;
      height: 48px;
      background: #00AEEF;
      border-radius: 50%;
      z-index: -1;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .logo-small img { 
      width: 100%; 
      height: 100%; 
      object-fit: contain; 
      position: relative;
      z-index: 1;
    }
    
    /* Search Bar */
    .search-container {
      padding: 12px 24px;
      background: #FFFFFF;
      border-bottom: 1px solid #E0E0E0;
    }
    .search-input {
      width: 100%;
      padding: 12px 20px;
      border: 1px solid #E0E0E0;
      border-radius: 25px;
      font-size: 16px;
      background: #F8F8F8;
      transition: all 0.3s ease;
    }
    .search-input:focus {
      outline: none;
      border-color: #00AEEF;
      box-shadow: 0 0 0 3px rgba(0, 174, 239, 0.1);
    }
    
    /* Status indicator */
    .status-indicator { padding: 8px 16px; background: #F5F5F5; border: 1px solid #E0E0E0; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s ease; color: #000000; }
    .status-indicator:hover { border-color: #00AEEF; transform: scale(1.05); }
    .status-indicator svg { width: 12px; height: 12px; }
    .status-available svg { fill: #00AEEF; }
    .status-busy svg { fill: #FFFF00; }
    .status-offline svg { fill: #FF0000; }
    
    .favorites-list { flex: 1; overflow-y: auto; padding: 16px 24px 80px; position: relative; }
    
    /* Favorite Cards */
    .favorite-card { background: #F8F8F8; border-radius: 20px; padding: 20px; margin-bottom: 20px; display: flex; align-items: center; position: relative; overflow: hidden; cursor: pointer; border: 1px solid #EEEEEE; transition: transform 0.2s ease, box-shadow 0.2s ease; animation: fadeInUp 0.4s ease; }
    .favorite-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0, 174, 239, 0.15); }
    .favorite-card:active { transform: scale(0.98); }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .profile-photo { width: 72px; height: 72px; border-radius: 50%; overflow: hidden; margin-right: 20px; background: #DDDDDD; box-shadow: 0 2px 8px rgba(0,0,0,0.1); flex-shrink: 0; }
    .profile-photo img { width: 100%; height: 100%; object-fit: cover; }
    
    .user-details { flex: 1; min-width: 0; }
    .name-age { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: #000000; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .distance-badge { font-size: 12px; font-weight: 500; color: #00AEEF; background: rgba(0, 174, 239, 0.1); padding: 4px 8px; border-radius: 12px; }
    .bio-snippet { font-size: 15px; color: #666666; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta-info { display: flex; align-items: center; gap: 12px; font-size: 14px; color: #8E8E8E; }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #808080; transition: all 0.3s ease; }
    .status-dot.online { background: #00AEEF; box-shadow: 0 0 8px #00AEEF; animation: pulse 2s infinite; }
    .status-dot.busy { background: #FFFF00; box-shadow: 0 0 8px #FFFF00; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    
    /* Favorite icon - red heart */
    .favorite-icon { padding: 12px; margin-left: 12px; cursor: pointer; transition: transform 0.2s; }
    .favorite-icon:hover { transform: scale(1.1); }
    .favorite-icon svg { width: 28px; height: 28px; fill: #FF0000; transition: transform 0.3s ease; }
    .favorite-icon:active svg { animation: heartPulse 0.5s ease; }
    
    @keyframes heartPulse { 
      0% { transform: scale(1); } 
      50% { transform: scale(1.5); } 
      100% { transform: scale(1); } 
    }
    
    /* Empty state */
    .empty-state { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; animation: fadeInUp 0.4s ease; }
    .empty-icon { width: 120px; height: 120px; margin-bottom: 32px; opacity: 0.4; fill: #666666; }
    .empty-title { font-size: 20px; margin-bottom: 12px; color: #333333; }
    .empty-subtitle { font-size: 16px; color: #666666; line-height: 1.5; margin-bottom: 24px; }
    .empty-button { padding: 12px 24px; background: #00AEEF; color: #000000; border: none; border-radius: 25px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .empty-button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0, 174, 239, 0.3); }
    
    /* Bottom navigation */
    .bottom-nav { display: flex; height: 64px; background: #FFFFFF; border-top: 1px solid #E0E0E0; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: #666666; cursor: pointer; transition: color 0.2s; position: relative; }
    .nav-item.active { color: #00FF00; }
    .nav-item:hover { color: #333333; transform: translateY(-2px); }
    .nav-item.active .nav-icon svg { fill: #00FF00; }
    .nav-item .nav-icon svg { fill: currentColor; }
    .nav-icon svg { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; transition: transform 0.2s; }
    .nav-item:hover .nav-icon svg { transform: scale(1.1); }
    
    /* Favorite count badge */
    .favorite-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #FF0000;
      color: white;
      border-radius: 50%;
      min-width: 18px;
      height: 18px;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      animation: badgePulse 1s infinite;
    }
    
    @keyframes badgePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    /* FAB button */
    .fab { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 64px; height: 64px; background: #00AEEF; color: #000000; border-radius: 32px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(0,174,239,0.3); cursor: pointer; z-index: 101; transition: transform 0.2s, box-shadow 0.2s; border: none; }
    .fab:hover { transform: translateX(-50%) scale(1.05); box-shadow: 0 6px 16px rgba(0,174,239,0.5); }
    .fab:active { transform: translateX(-50%) scale(0.95); }
    .fab svg { width: 32px; height: 32px; fill: #000000; }
    
    /* Toast notification */
    #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.95); color: #000000; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; box-shadow: 0 4px 12px rgba(0, 174, 239, 0.2); opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 200; max-width: 90%; text-align: center; backdrop-filter: blur(8px); border: 1px solid rgba(0,174,239,0.3); }
    #toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(-8px); }
    
    /* Shimmer Loading Effect */
    .shimmer-wrapper {
      position: relative;
      width: 100%;
      padding: 16px 0;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.4s ease;
    }
    .shimmer-wrapper.hidden { opacity: 0; visibility: hidden; display: none; }
    .shimmer-card {
      background: #F0F0F0;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      border: 1px solid #E0E0E0;
      position: relative;
      overflow: hidden;
    }
    .shimmer-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -150%;
      width: 150%;
      height: 100%;
      background: linear-gradient(90deg, transparent 0%, rgba(0, 174, 239, 0.1) 20%, rgba(0, 174, 239, 0.2) 50%, rgba(0, 174, 239, 0.1) 80%, transparent 100%);
      animation: shimmer 1.5s infinite linear;
    }
    .shimmer-photo { width: 72px; height: 72px; border-radius: 50%; background: #DDDDDD; margin-right: 20px; flex-shrink: 0; }
    .shimmer-details { flex: 1; }
    .shimmer-name { height: 20px; width: 60%; background: #DDDDDD; border-radius: 8px; margin-bottom: 12px; }
    .shimmer-bio { height: 15px; width: 85%; background: #DDDDDD; border-radius: 8px; margin-bottom: 12px; }
    .shimmer-meta { height: 14px; width: 40%; background: #DDDDDD; border-radius: 8px; }
    .shimmer-heart { width: 28px; height: 28px; background: #DDDDDD; border-radius: 8px; margin-left: 12px; flex-shrink: 0; }
    
    @keyframes shimmer {
      0% { left: -150%; }
      100% { left: 200%; }
    }
    
    /* Pull to refresh */
    .pull-to-refresh {
      text-align: center;
      padding: 10px;
      color: #999;
      font-size: 12px;
      transition: all 0.3s ease;
    }
    .pull-to-refresh.active {
      padding: 20px;
      color: #00AEEF;
    }
    
    /* Scrollbar styling */
    .favorites-list::-webkit-scrollbar { width: 4px; }
    .favorites-list::-webkit-scrollbar-track { background: #F0F0F0; }
    .favorites-list::-webkit-scrollbar-thumb { background: #CCCCCC; border-radius: 4px; }
    .favorites-list::-webkit-scrollbar-thumb:hover { background: #AAAAAA; }
    
    img { max-width: 100%; height: auto; }
    .profile-photo { flex-shrink: 0; }
    
    @media (max-width: 480px) {
      .profile-photo { width: 56px; height: 56px; margin-right: 12px; }
      .name-age { font-size: 16px; }
      .bio-snippet { font-size: 13px; }
      .favorite-icon svg { width: 24px; height: 24px; }
    }
  </style>
</head>
<body>

  <div class="bottom-nav">

      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z"/></svg>
      </div>
      <div>Live</div>
    </div>
    <div class="nav-item active" id="nav-favorites">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </div>

      <div class="favorite-badge" id="favorite-count" style="display: none;">0</div>
    </div>
    <div class="nav-item"></div>
    <div class="nav-item" id="nav-chats">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><path d="M21 6h-2v9H6v2c0 .55.45 1 1 1h11l4 4V7c0-.55-.45-1-1-1zm-4 6V3c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v14l4-4h10c.55 0 1-.45 1-1z"/></svg>
      </div>

        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>

    <button class="fab" id="fab-post" aria-label="Post Request">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>

  <div id="toast"></div>

  <script>
    const fallbackImage = 'https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png';
    const API_BASE_URL = 'http://localhost:10000/api';
    let wsManager = null;
    let currentUserId = null;
    let favoritesData = [];

    function showToast(message, duration = 2000) {
      const toast = document.getElementById('toast');
      if (!toast) return;
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toast.hideTimeout);
      toast.hideTimeout = setTimeout(() => toast.classList.remove('show'), duration);
    }

    function formatDistance(distance) {
      if (!distance || distance === 'Unknown') return 'Nearby';
      if (typeof distance === 'number') {
        if (distance < 1000) return `${Math.round(distance)}m away`;
        return `${(distance / 1000).toFixed(1)}km away`;
      }
      if (typeof distance === 'string') {
        const num = parseFloat(distance);
        if (!isNaN(num)) {
          if (num < 1000) return `${Math.round(num)}m away`;
          return `${(num / 1000).toFixed(1)}km away`;
        }
      }
      return 'Nearby';
    }

    function parseJwt(token) {
      if (!token) return null;
      try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => 
          '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
        ).join(''));
        const payload = JSON.parse(jsonPayload);
        return payload.userId || payload.sub || payload.id || null;
      } catch (e) {
        console.error('Failed to parse JWT:', e);
        return null;
      }
    }

    function updateFavoriteCount(count) {
      const badge = document.getElementById('favorite-count');
      if (badge) {
        if (count > 0) {
          badge.textContent = count;
          badge.style.display = 'flex';
        } else {
          badge.style.display = 'none';
        }
      }
    }

    function updateUserStatus(userId, status) {
      const card = document.querySelector(`.favorite-card[data-user-id="${userId}"]`);
      if (card) {
        const statusDot = card.querySelector('.status-dot');
        if (status === 'available') {
          statusDot.className = 'status-dot online';
        } else if (status === 'busy') {
          statusDot.className = 'status-dot busy';
        } else {
          statusDot.className = 'status-dot';
        }
      }
    }

    class WebSocketManager {
      constructor() {
        this.socket = null;
        this.reconnectInterval = 3000;
        this.maxReconnectAttempts = 5;
        this.reconnectAttempts = 0;
        this.isConnected = false;
        this.shouldReconnect = true;
      }

      connect() {
        const token = localStorage.getItem('token');
        if (!token || this.socket?.readyState === WebSocket.OPEN) return;

        const wsUrl = `ws://localhost:10000/ws?token=${encodeURIComponent(token)}`;
        console.log('Connecting WebSocket for favorites...');
        
        try {
          this.socket = new WebSocket(wsUrl);
          
          this.socket.onopen = () => {
            console.log('WebSocket connected for favorites');
            this.isConnected = true;
            this.reconnectAttempts = 0;
            setTimeout(() => {
              this.send({ type: 'subscribe', channel: 'user_status' });
            }, 500);
          };

          this.socket.onmessage = (event) => {
            try {
              const data = JSON.parse(event.data);
              if (data.type === 'user_status_update') {
                updateUserStatus(data.userId, data.status);
              }
            } catch (error) {
              console.error('WebSocket message error:', error);
            }
          };

          this.socket.onclose = () => {
            this.isConnected = false;
            if (this.shouldReconnect && this.reconnectAttempts < this.maxReconnectAttempts) {
              setTimeout(() => this.reconnect(), this.reconnectInterval);
            }
          };

          this.socket.onerror = (error) => {
            console.error('WebSocket error:', error);
          };
        } catch (error) {
          console.error('WebSocket connection error:', error);
        }
      }

      reconnect() {
        this.reconnectAttempts++;
        console.log(`Reconnecting WebSocket (${this.reconnectAttempts}/${this.maxReconnectAttempts})`);
        this.connect();
      }

      send(data) {
        if (this.socket?.readyState === WebSocket.OPEN) {
          this.socket.send(JSON.stringify(data));
        }
      }

      disconnect() {
        this.shouldReconnect = false;
        if (this.socket) {
          this.socket.close();
          this.socket = null;
        }
      }
    }

    async function loadFavorites(attempt = 1) {
      const token = localStorage.getItem('token');
      if (!token) {
        showToast('Please log in first');
        setTimeout(() => window.location.href = 'login.html', 1500);
        return;
      }

      const favoritesList = document.getElementById('favorites-list');
      const shimmer = document.getElementById('shimmer');
      const pullToRefresh = document.getElementById('pull-to-refresh');
      
      if (shimmer) shimmer.classList.remove('hidden');
      if (pullToRefresh) pullToRefresh.classList.remove('active');

      try {
        const res = await fetch(`${API_BASE_URL}/favorites`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.status === 401) {
          showToast('Session expired. Please log in again.');
          localStorage.removeItem('token');
          setTimeout(() => window.location.href = 'login.html', 1500);
          return;
        }

        if (!res.ok) throw new Error(`Server error ${res.status}`);

        const favorites = await res.json();
        favoritesData = Array.isArray(favorites) ? favorites : [];

        updateFavoriteCount(favoritesData.length);

        if (shimmer) shimmer.classList.add('hidden');
        
        favoritesList.innerHTML = '';
        
        // Remove shimmer wrapper if it exists
        const existingShimmer = favoritesList.querySelector('.shimmer-wrapper');
        if (existingShimmer) existingShimmer.remove();

        if (favoritesData.length === 0) {
          favoritesList.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                  <line x1="4" y1="4" x2="20" y2="20" stroke-width="3" stroke-linecap="round"/>
                </svg>
              </div>
              <div class="empty-title">No favorites yet</div>
              <div class="empty-subtitle">You haven't saved anyone yet. Explore live requests and add people you like!</div>
              <button class="empty-button" onclick="window.location.href='live-requests.html'">Explore Live Requests →</button>
            </div>
          `;
          return;
        }

        favoritesData.forEach((item, index) => {
          const user = item.user || {};
          const displayName = user.name || 'User';
          const displayBio = user.bio || 'No bio yet';
          const avatarUrl = user.avatar || fallbackImage;
          const distance = formatDistance(user.distance);
          const status = user.status || 'offline';

          const card = document.createElement('div');
          card.className = 'favorite-card';
          card.dataset.userId = item.targetUserId;
          card.style.animationDelay = `${index * 0.05}s`;

          card.innerHTML = `
            <div class="profile-photo">
              <img src="${avatarUrl}" alt="${displayName}" onerror="this.src='${fallbackImage}'" loading="lazy">
            </div>
            <div class="user-details">
              <div class="name-age">
                ${escapeHtml(displayName)}
                <span class="distance-badge">${distance}</span>
              </div>
              <div class="bio-snippet">${escapeHtml(displayBio)}</div>
              <div class="meta-info">
                <div>⭐ Favorited</div>
                <div class="status-dot ${status === 'available' ? 'online' : status === 'busy' ? 'busy' : ''}"></div>
                <div>${status === 'available' ? 'Online' : status === 'busy' ? 'Busy' : 'Offline'}</div>
              </div>
            </div>
            <div class="favorite-icon" title="Remove from favorites">
              <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </div>
          `;

          favoritesList.appendChild(card);
        });

        // Restore pull to refresh element
        const newPullToRefresh = document.createElement('div');
        newPullToRefresh.className = 'pull-to-refresh';
        newPullToRefresh.id = 'pull-to-refresh';
        newPullToRefresh.textContent = '↓ Pull down to refresh';
        favoritesList.insertBefore(newPullToRefresh, favoritesList.firstChild);

      } catch (err) {
        console.error('Favorites load error:', err);
        if (shimmer) shimmer.classList.add('hidden');
        
        if (attempt < 3) {
          showToast(`Retrying... (${attempt}/3)`);
          setTimeout(() => loadFavorites(attempt + 1), 2000);
        } else {
          favoritesList.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="12" y1="8" x2="12" y2="12"/>
                  <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
              </div>
              <div class="empty-title">Failed to load favorites</div>
              <div class="empty-subtitle">Please check your connection and try again</div>
              <button class="empty-button" onclick="location.reload()">Retry</button>
            </div>
          `;
        }
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function removeFavorite(userId, cardElement) {
      const token = localStorage.getItem('token');
      if (!token) return;

      const heartIcon = cardElement.querySelector('.favorite-icon svg');
      heartIcon.style.animation = 'heartPulse 0.5s ease';

      try {
        const res = await fetch(`${API_BASE_URL}/favorite`, {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ targetUserId: userId })
        });

        if (!res.ok) throw new Error('Failed to remove favorite');

        showToast('Removed from favorites 💔');
        
        cardElement.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        cardElement.style.opacity = '0';
        cardElement.style.transform = 'translateX(100%)';
        
        setTimeout(() => {
          cardElement.remove();
          favoritesData = favoritesData.filter(f => f.targetUserId !== userId);
          updateFavoriteCount(favoritesData.length);
          
          if (favoritesList.children.length === 1 || favoritesData.length === 0) {
            loadFavorites();
          }
        }, 300);
      } catch (err) {
        console.error('Remove favorite error:', err);
        showToast('Failed to remove favorite');
      }
    }

    async function startChat(userId) {
      const token = localStorage.getItem('token');
      if (!token) return;

      showToast('Creating chat...', 1000);
      
      try {
        const res = await fetch(`${API_BASE_URL}/chats`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ participants: [userId] })
        });

        if (!res.ok) {
          const error = await res.text();
          throw new Error(error || 'Failed to create chat');
        }

        const data = await res.json();
        const chatId = data.id || data._id;
        
        if (chatId) {
          showToast('Chat opened! 🚀');
          setTimeout(() => {
            window.location.href = `chat.html?id=${chatId}`;
          }, 500);
        } else {
          throw new Error('No chat ID returned');
        }
      } catch (err) {
        console.error('Start chat error:', err);
        showToast('Failed to open chat. Please try again.');
      }
    }

    // Load user status
    async function loadUserStatus() {
      const token = localStorage.getItem('token');
      if (!token) return;

      try {
        const res = await fetch(`${API_BASE_URL}/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (res.ok) {
          const data = await res.json();
          const statusEl = document.getElementById('status');
          const statuses = ['available', 'busy', 'offline'];
          const currentStatus = data.status || 'available';
          const index = statuses.indexOf(currentStatus);
          
          if (index !== -1) {
            updateStatusUI(index);
          }
        }
      } catch (err) {
        console.error('Load status error:', err);
      }
    }

    function updateStatusUI(index) {
      const statusEl = document.getElementById('status');
      const statuses = [
        { text: 'Available', class: 'status-available', value: 'available' },
        { text: 'Busy', class: 'status-busy', value: 'busy' },
        { text: 'Offline', class: 'status-offline', value: 'offline' }
      ];
      
      const s = statuses[index];
      statusEl.className = `status-indicator ${s.class}`;
      statusEl.innerHTML = `<svg viewBox="0 0 8 8"><circle cx="4" cy="4" r="4"/></svg> ${s.text}`;
    }

    // Pull to refresh
    let touchStartY = 0;
    let isRefreshing = false;

    function initPullToRefresh() {
      const favoritesList = document.getElementById('favorites-list');
      let startY = 0;

      favoritesList.addEventListener('touchstart', (e) => {
        if (favoritesList.scrollTop === 0) {
          startY = e.touches[0].clientY;
        }
      });

      favoritesList.addEventListener('touchmove', (e) => {
        if (favoritesList.scrollTop === 0 && startY) {
          const pullDistance = e.touches[0].clientY - startY;
          const pullToRefresh = document.getElementById('pull-to-refresh');
          if (pullDistance > 50 && pullToRefresh && !isRefreshing) {
            pullToRefresh.classList.add('active');
            pullToRefresh.textContent = 'Release to refresh';
          } else if (pullToRefresh && pullDistance < 50) {
            pullToRefresh.classList.remove('active');
            pullToRefresh.textContent = '↓ Pull down to refresh';
          }
        }
      });

      favoritesList.addEventListener('touchend', async (e) => {
        const pullToRefresh = document.getElementById('pull-to-refresh');
        if (pullToRefresh && pullToRefresh.classList.contains('active') && !isRefreshing) {
          isRefreshing = true;
          pullToRefresh.textContent = 'Refreshing...';
          await loadFavorites();
          setTimeout(() => {
            pullToRefresh.classList.remove('active');
            pullToRefresh.textContent = '↓ Pull down to refresh';
            isRefreshing = false;
            showToast('Favorites refreshed!');
          }, 500);
        }
        startY = 0;
      });
    }

    // Search functionality
    function initSearch() {
      const searchInput = document.getElementById('search-input');
      if (!searchInput) return;

      searchInput.addEventListener('input', (e) => {
        const searchTerm = e.target.value.toLowerCase().trim();
        const cards = document.querySelectorAll('.favorite-card');
        
        cards.forEach(card => {
          const name = card.querySelector('.name-age')?.textContent.toLowerCase() || '';
          const bio = card.querySelector('.bio-snippet')?.textContent.toLowerCase() || '';
          
          if (name.includes(searchTerm) || bio.includes(searchTerm)) {
            card.style.display = 'flex';
            card.style.animation = 'fadeInUp 0.3s ease';
          } else {
            card.style.display = 'none';
          }
        });
      });
    }

    // Event delegation for clicks
    function initEventDelegation() {
      const favoritesList = document.getElementById('favorites-list');
      
      favoritesList.addEventListener('click', async (e) => {
        const card = e.target.closest('.favorite-card');
        if (!card) return;

        const heartIcon = e.target.closest('.favorite-icon');
        if (heartIcon) {
          e.stopPropagation();
          const userId = card.dataset.userId;
          await removeFavorite(userId, card);
        } else {
          const userId = card.dataset.userId;
          await startChat(userId);
        }
      });
    }

    // Navigation
    function initNavigation() {
      document.getElementById('nav-live')?.addEventListener('click', () => {
        window.location.href = 'live-requests.html';
      });
      
      document.getElementById('nav-chats')?.addEventListener('click', () => {
        window.location.href = 'chats.html';
      });
      
      document.getElementById('nav-profile')?.addEventListener('click', () => {
        window.location.href = 'my-profile.html';
      });
      
      document.getElementById('fab-post')?.addEventListener('click', () => {
        window.location.href = 'post.html';
      });
    }

    // Status indicator click handler
    async function initStatusHandler() {
      const statusEl = document.getElementById('status');
      const token = localStorage.getItem('token');
      if (!statusEl || !token) return;

      let currentStatusIndex = 0;
      const statuses = ['available', 'busy', 'offline'];
      
      // Get current status
      try {
        const res = await fetch(`${API_BASE_URL}/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          const data = await res.json();
          const index = statuses.indexOf(data.status);
          if (index !== -1) currentStatusIndex = index;
          updateStatusUI(currentStatusIndex);
        }
      } catch (err) {
        console.error('Error loading status:', err);
      }

      statusEl.addEventListener('click', async () => {
        currentStatusIndex = (currentStatusIndex + 1) % statuses.length;
        const newStatus = statuses[currentStatusIndex];
        updateStatusUI(currentStatusIndex);
        
        try {
          const res = await fetch(`${API_BASE_URL}/me/status`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ status: newStatus })
          });
          
          if (res.ok) {
            showToast(`Status changed to ${newStatus}`);
            if (wsManager?.isConnected) {
              wsManager.send({
                type: 'status_update',
                status: newStatus,
                userId: currentUserId
              });
            }
          } else {
            throw new Error('Failed to update status');
          }
        } catch (err) {
          console.error('Status update error:', err);
          showToast('Failed to update status');
          // Revert status
          currentStatusIndex = (currentStatusIndex + 2) % statuses.length;
          updateStatusUI(currentStatusIndex);
        }
      });
    }

    // Initialize app
    (function init() {
      const token = localStorage.getItem('token');
      if (!token) {
        showToast('Please log in to continue');
        setTimeout(() => window.location.href = 'login.html', 1500);
        return;
      }

      currentUserId = parseJwt(token);
      if (!currentUserId) {
        showToast('Invalid session. Please log in again.');
        localStorage.removeItem('token');
        setTimeout(() => window.location.href = 'login.html', 1500);
        return;
      }

      // Initialize WebSocket
      wsManager = new WebSocketManager();
      wsManager.connect();

      // Initialize all features
      loadFavorites();
      loadUserStatus();
      initPullToRefresh();
      initSearch();
      initEventDelegation();
      initNavigation();
      initStatusHandler();

      // Cleanup on page unload
      window.addEventListener('beforeunload', () => {
        if (wsManager) wsManager.disconnect();
      });
    })();
  </script>
</body>
</html>
